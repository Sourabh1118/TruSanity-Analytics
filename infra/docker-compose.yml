services:
  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL — OLTP (users, workspaces, billing, tracking rules)
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: netra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netra_db
      POSTGRES_USER: netra
      POSTGRES_PASSWORD: netra_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U netra -d netra_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Redis — API key cache, rate limiting, BullMQ job queue
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Apache Kafka (KRaft mode — no Zookeeper needed)
  # ─────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.2
    container_name: netra_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft settings (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@netra_kafka:9093
      # Listeners — INTERNAL for docker containers, EXTERNAL for host services
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Retention (7 days)
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Kafka UI — web interface for monitoring topics & consumer groups
  # ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: netra_kafka_ui
    restart: unless-stopped
    ports:
      - "9080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: netra-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # ─────────────────────────────────────────────────────────────────
  # ClickHouse — OLAP columnar database for all analytics events
  # ─────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.11
    container_name: netra_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123" # HTTP interface (used by SDK and Web UI)
      - "9001:9000" # Native TCP interface
    environment:
      CLICKHOUSE_DB: netra
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Netra Consumer — Kafka → ClickHouse bridge (Node.js)
  # ─────────────────────────────────────────────────────────────────
  consumer:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.consumer
    container_name: netra_consumer
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      CLICKHOUSE_URL: http://clickhouse:8123
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────
# Named volumes for data persistence
# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clickhouse_data:
